services:
  app:
    image: ghcr.io/authortom/skillslab:latest
    ports:
      - "3000:3000"
    environment:
      # Override with: ADMIN_PASSWORD=... docker compose up, or an .env file.
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-clinical-admin}
    volumes:
      - clinical-data:/app/data
    restart: unless-stopped
    init: true
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://localhost:3000/').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  clinical-data:
